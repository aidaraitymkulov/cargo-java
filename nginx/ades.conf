# Добавить эти location-блоки внутрь существующего server { listen 443 ssl; ... } для greenchicken.kg

# Backend API
location /ades/api/ {
    proxy_pass http://127.0.0.1:8080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /ades/api;

    # Для загрузки файлов (Excel импорт)
    client_max_body_size 30M;

    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
}

# Admin panel (React/Vite SPA)
location /ades/admin/ {
    proxy_pass http://127.0.0.1:3001/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SPA fallback — все подпути отдаём index.html
    proxy_intercept_errors on;
    error_page 404 = @ades_admin_fallback;
}

location @ades_admin_fallback {
    proxy_pass http://127.0.0.1:3001/index.html;
}