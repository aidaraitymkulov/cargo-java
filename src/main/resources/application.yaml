spring:
  application:
    name: cargoapp-backend
  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
      resolve-lazily: true

server:
  port: 8080
  tomcat:
    max-http-form-post-size: 25MB
    max-swallow-size: 26MB

app:
  upload-dir: uploads
  smartpoint:
    api-url: https://smartpoint.kg/api/v1/ades
    api-token: ${SMARTPOINT_API_TOKEN:}
    webhook-secret: ${SMARTPOINT_WEBHOOK_SECRET:}
